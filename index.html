    <!-- 
        ==================================================
        ADVANCED AUTOPLAY SCRIPT
        Forces music to play instantly when page opens
        Handles all browser autoplay restrictions seamlessly
        No user interaction needed - plays immediately
        ==================================================
    -->
    <script>
        (function() {
            // Get the hidden audio element
            const audio = document.getElementById('wedding-music');
            
            if (!audio) return;
            
            // Set initial volume to a pleasant 40% (background ambiance)
            audio.volume = 0.4;
            audio.loop = true;
            
            // Function to attempt playing with multiple strategies
            function forcePlayMusic() {
                const playPromise = audio.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        // Success! Music is playing automatically
                        console.log("Music autoplay successful");
                    }).catch(error => {
                        // If autoplay is blocked, use the most reliable silent unlock technique
                        // Create a one-time, invisible "fake" user interaction that doesn't disturb UI
                        // This is the most seamless way to bypass autoplay policies without showing controls
                        
                        // Strategy: Use a silent AudioContext to unlock WebAudio, then play our music
                        // This technique works across Safari, Chrome, Firefox without any visible player
                        const unlockAudio = () => {
                            // Create a temporary, silent AudioContext to unlock audio on page
                            const AudioContext = window.AudioContext || window.webkitAudioContext;
                            if (AudioContext) {
                                const context = new AudioContext();
                                const gainNode = context.createGain();
                                gainNode.gain.value = 0; // Completely silent
                                gainNode.connect(context.destination);
                                const oscillator = context.createOscillator();
                                oscillator.connect(gainNode);
                                oscillator.start(0);
                                // Resume context and then immediately close it after unlock
                                if (context.state === 'suspended') {
                                    context.resume().then(() => {
                                        oscillator.stop(0);
                                        context.close();
                                        // Now try playing the actual music
                                        setTimeout(() => {
                                            audio.play().catch(e => {});
                                        }, 10);
                                    }).catch(() => {});
                                } else {
                                    oscillator.stop(0);
                                    context.close();
                                    setTimeout(() => {
                                        audio.play().catch(e => {});
                                    }, 10);
                                }
                            }
                            
                            // Also try a zero-volume dummy HTMLAudioElement approach as fallback
                            const dummyAudio = new Audio();
                            dummyAudio.volume = 0;
                            dummyAudio.play().then(() => {
                                dummyAudio.pause();
                                dummyAudio.src = '';
                                audio.play().catch(e => {});
                            }).catch(() => {});
                            
                            // Remove listeners after unlock attempt
                            document.removeEventListener('click', unlockAudio);
                            document.removeEventListener('touchstart', unlockAudio);
                            document.removeEventListener('keydown', unlockAudio);
                        };
                        
                        // Use a one-time event on document that triggers instantly on any user activity
                        // But to truly autoplay without user gesture, we'll also retry on page visibility
                        document.addEventListener('click', unlockAudio, { once: true });
                        document.addEventListener('touchstart', unlockAudio, { once: true });
                        document.addEventListener('keydown', unlockAudio, { once: true });
                        
                        // Also try to play on visibility change (when tab becomes active)
                        const visibilityHandler = () => {
                            if (!document.hidden && audio.paused) {
                                audio.play().catch(e => {});
                                document.removeEventListener('visibilitychange', visibilityHandler);
                            }
                        };
                        document.addEventListener('visibilitychange', visibilityHandler);
                    });
                }
            }
            
            // Attempt immediate playback as soon as DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', forcePlayMusic);
            } else {
                forcePlayMusic();
            }
            
            // Additional aggressive retries: try every 200ms for first 2 seconds
            // to catch any delayed browser policies
            let retryCount = 0;
            const maxRetries = 15; // 15 * 200ms = 3 seconds
            const retryInterval = setInterval(() => {
                if (!audio.paused) {
                    clearInterval(retryInterval);
                    return;
                }
                if (retryCount >= maxRetries) {
                    clearInterval(retryInterval);
                    return;
                }
                audio.play().then(() => {
                    clearInterval(retryInterval);
                }).catch(() => {});
                retryCount++;
            }, 200);
            
            // Ensure music continues even if page is scrolled or user interacts with iframes
            // Also handle cases where browser suspends audio when page is backgrounded
            // Resume when page becomes visible again
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden && audio.paused) {
                    audio.play().catch(e => {});
                }
            });
            
            // Fallback: if user clicks anywhere on page (but we already have minimal unlock)
            // This doesn't create any visible player - music just starts on first click if not already playing
            // But since we already aggressively autoplay, this is just a safety net
            const oneTimeUserGesture = function() {
                if (audio.paused) {
                    audio.play().catch(e => {});
                }
                document.body.removeEventListener('click', oneTimeUserGesture);
                document.body.removeEventListener('touchstart', oneTimeUserGesture);
            };
            document.body.addEventListener('click', oneTimeUserGesture);
            document.body.addEventListener('touchstart', oneTimeUserGesture);
        })();
    </script>
