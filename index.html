<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eman & Abdelrahman</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap"
        rel="stylesheet">

    <style>
        /* hide audio completely */
        audio {
            display: none;
        }
    </style>
</head>

<body>

    <!-- 🎵 MUSIC -->
    <audio id="bg-music" autoplay loop muted playsinline>
        <source src="music1.mp3" type="audio/mpeg">
    </audio>

    <!-- 💖 Floating Hearts -->
    <div class="hearts">
        <span>♡</span>
        <span>♡</span>
        <span>♡</span>
        <span>♡</span>
        <span>♡</span>
    </div>

    <!-- 💌 Main Content -->
    <div class="container">

        <div class="card">

            <p class="invite">
                Together with their families
            </p>

            <h1>Abdelrahman</h1>

            <div class="and">&</div>

            <h1>Eman</h1>

            <p class="text">
                joyfully invite you to celebrate our engagement
            </p>

            <h2>Saturday, June 6 2026</h2>

            <p class="details">
                7:00 PM
            </p>

            <p class="details">
                Giza, Egypt
            </p>

            <a href="https://www.google.com/maps/place/29%C2%B055'33.0%22N+31%C2%B003'32.0%22E/"
                target="_blank">

                <button>View Location</button>

            </a>

        </div>

    </div>

    <!-- 🎵 AUTOPLAY SCRIPT -->
    <script>
        window.addEventListener("load", () => {
            const music = document.getElementById("bg-music");

            // Try to start music
            const playPromise = music.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    // If autoplay works, unmute it
                    music.muted = false;
                }).catch((err) => {
                    console.log("Autoplay blocked:", err);
                });
            }
        });
    </script>

</body>
</html>
